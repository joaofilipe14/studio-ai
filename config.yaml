ollama:
  host: "http://localhost:11434"
  model: "qwen2.5:14b"
  temperature: 0.1
  top_p: 0.9
  num_ctx: 8192

run:
  num_runs: 5
  max_steps: 12
  max_tool_calls_per_step: 6
  auto_snapshot: true
  max_replans: 2
  snapshot_keep: 20


paths:
  state: "memory/current_state.json"
  kb: "memory/knowledge_base.md"
  logs: "workspace/logs"
  data: "workspace/data"
  backups: "workspace/backups"
  projects: "workspace/projects"
  hall_of_fame: "workspace/hall_of_fame"
  releases: "workspace/releases"